services:
  postgres:
    image: postgres:16-alpine
    container_name: jewelleryscheme-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jewelleryscheme}
      POSTGRES_USER: ${POSTGRES_USER:-root}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root}
    ports:
      - "${POSTGRES_PORT:-5439}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-root} -d ${POSTGRES_DB:-jewelleryscheme}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: jewelleryscheme-backend-dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: ${APP_URL:-http://localhost:8000}
      APP_KEY: ${APP_KEY:-}
      LOG_CHANNEL: ${LOG_CHANNEL:-stack}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-jewelleryscheme}
      DB_USERNAME: ${POSTGRES_USER:-root}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-root}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
      CACHE_STORE: ${CACHE_STORE:-database}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
    ports:
      - "${BACKEND_PORT:-8000}:80"
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
      - backend_storage:/var/www/html/storage
    command: >
      sh -lc 'mkdir -p storage/framework/views storage/framework/cache/data storage/framework/sessions bootstrap/cache && chmod -R 777 storage bootstrap/cache && if [ ! -f vendor/autoload.php ]; then composer install; fi && backend-entrypoint apache2-foreground'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: jewelleryscheme-frontend-dev
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
      CHOKIDAR_USEPOLLING: "1"
      WATCHPACK_POLLING: "true"
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
      API_URL: http://backend/api
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-jewellery-scheme-nextauth-secret}
      NEXTAUTH_BASEPATH: ${NEXTAUTH_BASEPATH:-/api/auth}
      BASEPATH: ${BASEPATH:-}
      NEXT_PUBLIC_DOCS_URL: ${NEXT_PUBLIC_DOCS_URL:-https://demos.pixinvent.com/materialize-nextjs-admin-template/documentation}
      MAPBOX_ACCESS_TOKEN: ${MAPBOX_ACCESS_TOKEN:-}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next

volumes:
  postgres_data:
  backend_vendor:
  backend_storage:
  frontend_node_modules:
  frontend_next:
